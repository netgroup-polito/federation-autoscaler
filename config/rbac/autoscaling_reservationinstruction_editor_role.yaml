# This rule is not used by the project federation-autoscaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the autoscaling.federation-autoscaler.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: autoscaling-reservationinstruction-editor-role
rules:
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - reservationinstructions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - reservationinstructions/status
  verbs:
  - get
