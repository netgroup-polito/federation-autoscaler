# This rule is not used by the project federation-autoscaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over broker.federation-autoscaler.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: broker-clusteradvertisement-admin-role
rules:
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements
  verbs:
  - '*'
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements/status
  verbs:
  - get
