# This rule is not used by the project federation-autoscaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to broker.federation-autoscaler.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: broker-clusteradvertisement-viewer-role
rules:
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements/status
  verbs:
  - get
