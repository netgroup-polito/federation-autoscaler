---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: clusteradvertisements.broker.federation-autoscaler.io
spec:
  group: broker.federation-autoscaler.io
  names:
    kind: ClusterAdvertisement
    listKind: ClusterAdvertisementList
    plural: clusteradvertisements
    shortNames:
    - cadv
    singular: clusteradvertisement
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterType
      name: Type
      type: string
    - jsonPath: .status.totalChunks
      name: Total
      type: integer
    - jsonPath: .status.reservedChunks
      name: Reserved
      type: integer
    - jsonPath: .status.availableChunks
      name: Available
      type: integer
    - jsonPath: .status.available
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterAdvertisement is the Broker-side record of a provider cluster's
          donatable capacity. Upserted by each Provider Agent every 30 s.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the desired state advertised by the provider.
            properties:
              clusterId:
                description: |-
                  ClusterID is the unique identifier of the provider cluster. It MUST match
                  the CN of the agent's mTLS client certificate (see docs/design.md §10.3).
                minLength: 1
                type: string
              clusterType:
                description: |-
                  ClusterType classifies the provider's capacity for chunk sizing; see
                  ChunkType in common_types.go.
                enum:
                - standard
                - gpu
                type: string
              liqoClusterId:
                description: |-
                  LiqoClusterID is the Liqo cluster identifier of the provider. Consumer
                  Agents use this value when executing liqoctl peer.
                minLength: 1
                type: string
              price:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Price is the cost per chunk-hour advertised by the provider. Surfaced to
                  the Cluster Autoscaler via the gRPC server's PricingNodePrice method to
                  enable CA's price Expander. Non-negative.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              resources:
                description: Resources is the currently allocatable capacity donated
                  by the provider.
                properties:
                  allocatable:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Allocatable is the set of donatable resources. The standard keys are cpu,
                      memory, and nvidia.com/gpu, but any Kubernetes resource name is accepted
                      (the Broker routes sizing decisions through the chunk-config ConfigMap).
                    type: object
                required:
                - allocatable
                type: object
              topology:
                description: |-
                  Topology is optional and is used by the Broker's decision engine and by
                  the gRPC server when stamping Liqo virtual-node labels.
                properties:
                  region:
                    description: |-
                      Region is a region identifier.
                      Mirrors the value of the topology.kubernetes.io/region node label.
                    type: string
                  zone:
                    description: |-
                      Zone is an availability-zone identifier.
                      Mirrors the value of the topology.kubernetes.io/zone node label.
                    type: string
                type: object
            required:
            - clusterId
            - clusterType
            - liqoClusterId
            - resources
            type: object
          status:
            description: status is the Broker's observed state for this advertisement.
            properties:
              available:
                description: |-
                  Available is true when LastSeen is newer than agent-heartbeat-timeout
                  (default 30 s, from the chunk-config ConfigMap). Unavailable providers
                  are excluded from /nodegroups responses and from new reservation decisions.
                type: boolean
              availableChunks:
                description: |-
                  AvailableChunks is TotalChunks minus ReservedChunks. Consumers see this
                  value as the maxSize of the corresponding node group.
                format: int32
                minimum: 0
                type: integer
              conditions:
                description: |-
                  Conditions reports the current state of the ClusterAdvertisement.
                  Standard condition types:
                    - "Available"  — the provider is reporting within agent-heartbeat-timeout.
                    - "Ready"      — chunks have been calculated and the advertisement is
                                     usable by the decision engine.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSeen:
                description: |-
                  LastSeen is the timestamp of the latest advertisement received from this
                  cluster. Updated on every successful POST /api/v1/advertisements (30 s
                  cadence).
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the metadata.generation the Broker most recently
                  reconciled. Used to detect stale status writes after concurrent updates.
                format: int64
                type: integer
              reservedChunks:
                description: |-
                  ReservedChunks is the number of chunks currently bound to active
                  Reservations (those whose phase is not Released | Expired | Failed).
                format: int32
                minimum: 0
                type: integer
              totalChunks:
                description: |-
                  TotalChunks is the number of chunks computed from the latest advertisement
                  using the chunk-config ConfigMap (see docs/design.md §6).
                format: int32
                minimum: 0
                type: integer
            required:
            - available
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
