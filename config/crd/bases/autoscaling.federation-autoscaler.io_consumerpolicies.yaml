---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: consumerpolicies.autoscaling.federation-autoscaler.io
spec:
  group: autoscaling.federation-autoscaler.io
  names:
    kind: ConsumerPolicy
    listKind: ConsumerPolicyList
    plural: consumerpolicies
    shortNames:
    - cpolicy
    singular: consumerpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.placement.type
      name: Placement
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ConsumerPolicy is a consumer-cluster-local declaration of how the Broker
          should place this consumer's borrowed capacity (e.g. prefer the cheapest
          providers). It lives only on the consumer cluster; the Broker never reads it
          directly — the Consumer Agent pushes its spec on the heartbeat, preserving
          the agent-initiated (no Broker→cluster dial-in) communication model.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the desired placement policy.
            properties:
              placement:
                description: |-
                  Placement is the resource-placement policy the Broker applies to this
                  consumer's requests.
                properties:
                  type:
                    description: |-
                      Type selects the placement strategy. Empty means the Broker default
                      (no preference; the Cluster Autoscaler picks). Supported values are
                      "Price" (cheapest), "Eco" (lowest carbon), and "Latency" (closest).
                    enum:
                    - Standard
                    - Price
                    - Eco
                    - Latency
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources: {}
