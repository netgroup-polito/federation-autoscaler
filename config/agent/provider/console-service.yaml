# NodePort Service exposing the provider config console to a browser on the
# operator's machine. The console is plain-HTTP and UNAUTHENTICATED and WRITES
# cluster state (prices / region / advertised-capacity) — demo-grade; expose
# only on a trusted network. The provider agent runs no other HTTP server.
apiVersion: v1
kind: Service
metadata:
  name: agent-console
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: agent
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: agent
  ports:
  - name: console
    port: 9095
    targetPort: console
    nodePort: 30445
    protocol: TCP
