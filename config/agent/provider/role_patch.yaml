# Provider-role overlay patch for the agent container.
#
# 1. Append --role=provider.
# 2. Append --price-file pointing at the mounted prices ConfigMap, and mount it.
#    The agent re-reads this file every advertisement cycle so an operator can
#    reprice without a restart. The ConfigMap is optional and ships empty, so a
#    provider with no prices set behaves exactly as before (advertises no price).
# 3. Append --capacity-file pointing at the mounted capacity ConfigMap, and mount
#    it. Same re-read-every-cycle semantics; ships empty so a provider with no
#    cap set advertises its full allocatable exactly as before.
# 4. Append --mock-eco-url (provider-only) for the eco strategy; the region file
#    and --mock-geo-url come from the base. Empty URL ⇒ advertise no carbon.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --mock-eco-url=$(MOCK_ECO_URL)
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --role=provider
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --price-file=/etc/federation-autoscaler/prices/prices.yaml
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --capacity-file=/etc/federation-autoscaler/capacity/capacity.yaml
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: prices
    mountPath: /etc/federation-autoscaler/prices
    readOnly: true
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: capacity
    mountPath: /etc/federation-autoscaler/capacity
    readOnly: true
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: prices
    configMap:
      name: agent-prices
      optional: true
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: capacity
    configMap:
      name: agent-capacity
      optional: true
# Config console (plain HTTP, no auth) — exposed via the agent-console NodePort
# Service so an operator can set prices/region/capacity from a browser. This is
# the provider role's only HTTP server.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --console-bind-address=:9095
- op: add
  path: /spec/template/spec/containers/0/ports/-
  value:
    name: console
    containerPort: 9095
    protocol: TCP
