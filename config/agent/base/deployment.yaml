# Agent Deployment.
#
# Single replica + strategy: Recreate is load-bearing: two agents polling
# concurrently would break the broker's CRD-backed idempotency (same
# X-Reservation-Id → same Reservation, same instruction id → same enforcement
# bit). See CLAUDE.md ("Conventions worth knowing") and docs/design.md §4.4.
#
# --role is intentionally not set in the base; the consumer/ and provider/
# overlays each layer a JSON-patch that appends the right value.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: federation-autoscaler
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: federation-autoscaler
        app.kubernetes.io/component: agent
      annotations:
        kubectl.kubernetes.io/default-container: agent
    spec:
      serviceAccountName: agent
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent
        image: federation-autoscaler/agent:latest
        imagePullPolicy: IfNotPresent
        args:
        - --cluster-id=$(CLUSTER_ID)
        - --liqo-cluster-id=$(LIQO_CLUSTER_ID)
        - --broker-url=$(BROKER_URL)
        - --client-cert=/etc/federation-autoscaler/tls/tls.crt
        - --client-key=/etc/federation-autoscaler/tls/tls.key
        - --broker-ca=/etc/federation-autoscaler/tls/ca.crt
        - --health-probe-bind-address=:8081
        # Pin the consumer agent's resources (VirtualNodeState, Liqo
        # ResourceSlice, kubeconfig Secret) to the agent's own namespace
        # rather than the binary default — keeps federation-autoscaler
        # CRs out of the liqo namespace.
        - --namespace=$(POD_NAMESPACE)
        # --role and (for consumer) --local-api-bind-address are appended
        # by the per-role overlays.
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLUSTER_ID
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: clusterId
        - name: LIQO_CLUSTER_ID
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: liqoClusterId
        - name: BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: brokerUrl
        ports:
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tls
          mountPath: /etc/federation-autoscaler/tls
          readOnly: true
        - name: liqoctl-cache
          mountPath: /home/nonroot/.kube
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tls
        secret:
          secretName: agent-client-cert
          # 0444 — see config/broker/deployment.yaml for the rationale.
          defaultMode: 0444
      - name: liqoctl-cache
        emptyDir: {}
      # liqoctl writes the staged kubeconfig under /tmp on the consumer side,
      # and Go's os.MkdirTemp falls back to /tmp too — give it an emptyDir so
      # readOnlyRootFilesystem doesn't break those writes.
      - name: tmp
        emptyDir: {}
