# Per-cluster identity for the agent.
#
# Operators MUST override these values before applying — the placeholders are
# placeholders. Use a kustomize overlay with `configMapGenerator` or a strategic
# patch.  The `clusterId` value is reflected onto the cert-manager Certificate's
# commonName via a kustomize replacement (see kustomization.yaml), so the agent
# cert's CN matches the broker's identity expectation (see docs/design.md §7.2,
# "Cluster identity").
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: federation-autoscaler-system
data:
  clusterId: "REPLACE_ME_CLUSTER_ID"
  liqoClusterId: "REPLACE_ME_LIQO_CLUSTER_ID"
  brokerUrl: "https://REPLACE_ME_BROKER_HOST:9443"
  # Base URLs of the demo mock services on the dedicated mock cluster, used by
  # the eco/latency placement strategies. Empty by default ⇒ the agent advertises
  # no carbon / no coordinates and the strategies have no effect. The fa_provider
  # / fa_consumer Ansible roles patch these to the mock cluster's address.
  # mockEcoUrl is consumed by providers only; mockGeoUrl by both roles.
  mockEcoUrl: ""
  mockGeoUrl: ""
  # Optional --advertised-ip override for automatic location discovery (the demo
  # steering lever). Empty ⇒ the agent geolocates its own node IP. Set to a value
  # inside a mock-geo CIDR to force this cluster's discovered location.
  advertisedIp: ""
