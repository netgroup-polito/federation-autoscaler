# Agent ClusterRole.
#
# Union of consumer + provider role needs — both roles share one image (only
# --role differs), so granting both rule-sets avoids per-role SA juggling.
#
# Consumer role uses:
#   - core/secrets in the agent namespace      kubeconfig staging
#   - autoscaling.federation-autoscaler.io/    Peer creates VirtualNodeState,
#       virtualnodestates                       Unpeer/Cleanup delete it
#   - authentication.liqo.io/resourceslices    Peer creates / Unpeer deletes
#   - authentication.liqo.io/identities        liqoctl peer applies the
#                                              Identity CR on the consumer
#                                              as the final handshake step
#   - offloading.liqo.io/                      Peer creates the singleton
#       {namespaceoffloadings,virtualnodes}    NamespaceOffloading named
#                                              literally "offloading"
#                                              (Liqo webhook hardcodes it);
#                                              reconciler watches VN
#   - ipam.liqo.io, networking.liqo.io         liqoctl peer also creates a
#                                              RoleBinding for the peering
#                                              user that grants these rules,
#                                              and K8s RBAC escalation
#                                              prevention requires the
#                                              agent SA to hold them too
#                                              even though we never use them
#
# Provider role uses:
#   - core/nodes                               snapshot for advertisements
#   - core/namespaces                          liqoctl creates a tenant ns
#                                              (default name liqo-tenant-<id>)
#                                              and listNamespaces filters by
#                                              label, so list/get cluster-wide
#   - core/{serviceaccounts,secrets}           created by `liqoctl generate
#                                              peering-user`
#   - rbac.authorization.k8s.io/{cluster}roles+{cluster}rolebindings
#                                              created by liqoctl for the
#                                              peering-user identity
#   - certificates.k8s.io/certificatesigningrequests + /approval
#                                              liqoctl mints a CSR for the
#                                              peering user and approves it
#                                              under the kube-apiserver-client
#                                              signer so the apiserver issues
#                                              the user cert
#   - apps/deployments                         liqoctl reads the Liqo controller-
#                                              manager Deployment to resolve
#                                              the API-server address that goes
#                                              into the returned kubeconfig
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: agent
rules:
# --- core ---------------------------------------------------------------
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# liqoctl's EnsureRoles creates a RoleBinding for the peering-user that
# grants `configmaps get/list/watch`. Kubernetes RBAC escalation prevention
# requires the agent SA to *hold* every permission it tries to grant, so
# we need configmaps-read at the cluster scope even though liqoctl never has
# us read configmaps ourselves.
#
# create/update/patch are additionally required by the config console
# (internal/agent/console): it upserts the agent-location (both roles) and
# agent-prices / agent-capacity (provider) ConfigMaps in the agent namespace so
# an operator can set region/prices/capacity from the browser instead of
# `kubectl apply`.
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
# --- apps (provider peering-user) ---------------------------------------
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
# --- certificates.k8s.io (provider peering-user CSR + approval) ---------
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
  # deletecollection is what `liqoctl delete peering-user` uses to clean
  # up the CSR it created; without it the Cleanup instruction fails and
  # the broker can't unwind a failed reservation.
  - deletecollection
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests/approval
  verbs:
  - update
# Approving a CSR additionally requires explicit permission to act on the
# signer it targets — liqoctl uses kubernetes.io/kube-apiserver-client.
- apiGroups:
  - certificates.k8s.io
  resources:
  - signers
  resourceNames:
  - kubernetes.io/kube-apiserver-client
  verbs:
  - approve
# --- rbac (provider peering-user) ---------------------------------------
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - create
  - update
  - delete
# --- federation-autoscaler CRs (consumer role) --------------------------
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - virtualnodestates
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - virtualnodestates/status
  verbs:
  - get
  - patch
  - update
# ConsumerPolicy is read each heartbeat by the consumer agent to learn this
# consumer's placement policy (e.g. prefer the cheapest providers) and push it
# to the Broker. Operators stamp it; the consumer config console
# (internal/agent/console) additionally create/update/deletes the `default`
# ConsumerPolicy when the operator picks a policy in the browser.
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - consumerpolicies
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# --- Liqo CRs (consumer role) -------------------------------------------
# `liqoctl unpeer` starts with a "bidirectional peering check" that LISTS
# foreignclusters.core.liqo.io at cluster scope; without this the Unpeer
# instruction fails with "foreignclusters... is forbidden" and the
# reservation goes Failed instead of Released (scale-down breaks). peer
# does not touch foreignclusters, which is why scale-UP worked without
# this rule. unpeer reads (not deletes) them; we grant the full verb set
# to stay ahead of teardown paths that may update/remove them.
- apiGroups:
  - core.liqo.io
  resources:
  - foreignclusters
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - authentication.liqo.io
  resources:
  - resourceslices
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# liqoctl peer creates an Identity CR on the consumer cluster as the last
# step of the handshake (after Tenant + WireGuard are up). The CR lives
# in the consumer-side tenant namespace liqo-tenant-<provider>; without
# this rule the call fails with "identities... is forbidden" and the
# whole peer command aborts with non-zero exit.
- apiGroups:
  - authentication.liqo.io
  resources:
  - identities
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - offloading.liqo.io
  resources:
  - namespaceoffloadings
  - virtualnodes
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# RBAC escalation-prevention: liqoctl's EnsureRoles forges a RoleBinding
# for the peering-user that grants the rules below. Even though the agent
# itself never reads these CRs, the apiserver requires the agent SA to
# *hold* the permissions it tries to grant.
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
- apiGroups:
  - ipam.liqo.io
  resources:
  - ips
  verbs:
  - get
  - create
  - update
  - delete
- apiGroups:
  - ipam.liqo.io
  resources:
  - networks
  verbs:
  - get
  - list
- apiGroups:
  - authentication.liqo.io
  resources:
  - tenants
  verbs:
  - get
  - list
  - create
  - update
  - delete
- apiGroups:
  - networking.liqo.io
  resources:
  - wggatewayclienttemplates
  - wggatewayservertemplates
  verbs:
  - get
  - list
- apiGroups:
  - networking.liqo.io
  resources:
  - configurations
  - gatewayclients
  - gatewayservers
  - publickeies
  verbs:
  - get
  - list
  - create
  - update
  - delete
- apiGroups:
  - networking.liqo.io
  resources:
  - connections
  - gatewayclients/status
  - gatewayservers/status
  verbs:
  - get
  - list
