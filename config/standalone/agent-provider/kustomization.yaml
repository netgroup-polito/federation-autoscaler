# Standalone provider-agent overlay — used by deploy/standalone/provider-up.sh.
#
# Reuses config/agent/provider but deletes the cert-manager `agent-client`
# Certificate: provider-up.sh instead creates the `agent-client-cert` Secret
# directly from the central-issued join bundle (a client cert with CN=cluster-id,
# already signed by the federation CA). So this overlay applies cleanly on a
# cluster with NO cert-manager CRDs. Everything else — the agent Deployment
# (--role=provider), agent-config, agent-prices / agent-capacity ConfigMaps, and
# the agent-console NodePort (30445) — is inherited unchanged. (Location is
# auto-discovered from the node IP; there is no location ConfigMap.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../agent/provider

patches:
- target:
    group: cert-manager.io
    kind: Certificate
    name: agent-client
  patch: |
    $patch: delete
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: agent-client
      namespace: federation-autoscaler-system
