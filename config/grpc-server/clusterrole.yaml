# gRPC server ClusterRole.
#
# Narrower than the broker / agent roles — on the consumer cluster the gRPC
# server reconciles the VirtualNodeState CRD and the user-created ResourceRequest
# CRD (manual reservations), and otherwise only READS Liqo / core resources.
# Every grant below matches a //+kubebuilder:rbac directive in
# internal/controller/autoscaling/{virtualnodestate,resourcerequest}_controller.go.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grpc-server
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: grpc-server
rules:
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - virtualnodestates
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - virtualnodestates/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - virtualnodestates/finalizers
  verbs:
  - update
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - resourcerequests
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - resourcerequests/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - resourcerequests/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
  # update/patch: the ResourceRequest controller sets the CA
  # scale-down-disabled annotation on a manual reservation's node(s) so the
  # autoscaler does not reclaim the empty (pod-less) borrowed node.
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
