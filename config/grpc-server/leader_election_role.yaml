# Namespace-scoped Role for the controller-runtime leader-election Lease
# (named after LeaderElectionID = "grpc-server.federation-autoscaler.io").
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grpc-server-leader-election
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: grpc-server
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grpc-server-leader-election
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: grpc-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grpc-server-leader-election
subjects:
- kind: ServiceAccount
  name: grpc-server
  namespace: federation-autoscaler-system
