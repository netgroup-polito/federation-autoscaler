# Single-cluster dev meta overlay.
#
# Composes the three component overlays + the CRDs onto ONE cluster — useful
# for end-to-end testing of the broker / consumer agent / gRPC server chain
# without provisioning multiple Kind clusters. The full multi-cluster topology
# (broker on a central cluster, consumer + grpc-server on a consumer cluster,
# providers elsewhere) is exercised in the step-13 e2e suite, not here.
#
# What this overlay assumes:
#   - cert-manager is installed in the cluster (the broker overlay deploys
#     the PKI chain; agent + grpc-server certs chain to the broker's CA
#     Issuer in this namespace)
#   - the chunk-config ConfigMap lives in federation-autoscaler-system (see
#     ../samples/chunk-config.yaml for a starting template)
#   - operators patch the agent-config ConfigMap with their cluster identity
#     before applying (see ../agent/base/kustomization.yaml's header)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../crd
- ../broker
- ../agent/consumer
- ../grpc-server
