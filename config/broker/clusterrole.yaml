# Broker-scoped ClusterRole.
#
# Authoritative over every CRD the broker reconcilers and REST API write to:
#   - broker.federation-autoscaler.io: ClusterAdvertisement, Reservation
#   - autoscaling.federation-autoscaler.io: ProviderInstruction, ReservationInstruction
#
# The Secret access is the "kubeconfig staging" path: the broker's API
# handler persists the peering-user kubeconfig into a Secret on receipt of a
# GenerateKubeconfig result, then reads it back when decorating the consumer's
# Peer instruction. Scoped to get/list/watch/create/update/delete because
# rotation overwrites the existing object.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: broker
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: broker
rules:
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements
  - reservations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements/finalizers
  - reservations/finalizers
  verbs:
  - update
- apiGroups:
  - broker.federation-autoscaler.io
  resources:
  - clusteradvertisements/status
  - reservations/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - providerinstructions
  - reservationinstructions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - providerinstructions/finalizers
  - reservationinstructions/finalizers
  verbs:
  - update
- apiGroups:
  - autoscaling.federation-autoscaler.io
  resources:
  - providerinstructions/status
  - reservationinstructions/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
