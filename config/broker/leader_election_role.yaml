# Namespace-scoped Role for the controller-runtime leader-election lock
# (a coordination.k8s.io/v1 Lease named after LeaderElectionID, plus the
# legacy ConfigMap path retained for cluster compatibility).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: broker-leader-election
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: broker
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: broker-leader-election
  namespace: federation-autoscaler-system
  labels:
    app.kubernetes.io/name: federation-autoscaler
    app.kubernetes.io/component: broker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: broker-leader-election
subjects:
- kind: ServiceAccount
  name: broker
  namespace: federation-autoscaler-system
