---
# Installs single-node k3s with the per-host Pod / Service CIDRs from
# inventory, then fetches the kubeconfig back to the control host as
# ~/.kube/<cluster_id>.yaml with the apiserver URL rewritten to the
# host's reachable IP (k3s defaults the URL to 127.0.0.1, which the
# control host obviously can't dial).

- name: Check whether k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s
  when: not k3s_binary.stat.exists
  ansible.builtin.shell:
    cmd: |
      curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        INSTALL_K3S_EXEC="\
          --cluster-cidr={{ pod_cidr }} \
          --service-cidr={{ service_cidr }} \
          --tls-san={{ ansible_host }} \
          --node-name={{ cluster_id }}" \
        sh -
    creates: /usr/local/bin/k3s

- name: Wait for k3s apiserver to become reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120

- name: Make the kubeconfig readable to the ansible_user
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'
  become: true

- name: Slurp the on-cluster kubeconfig
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig_raw

- name: Ensure kubeconfig dir exists on the control host
  ansible.builtin.file:
    path: "{{ kubeconfig_dir }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  run_once: false
  become: false

- name: Write kubeconfig to control host with reachable apiserver URL
  ansible.builtin.copy:
    content: "{{ k3s_kubeconfig_raw.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' + ansible_host + ':6443') }}"
    dest: "{{ kubeconfig_dir }}/{{ cluster_id }}.yaml"
    mode: '0600'
  delegate_to: localhost
  become: false
