---
# Fetches a node's k3s kubeconfig back to the control host as
# {{ kubeconfig_dir }}/{{ cluster_id }}.yaml, rewriting the apiserver URL
# from k3s's default 127.0.0.1 to the host's reachable {{ ansible_host }}.
#
# Factored out of main.yaml so the teardown playbook can re-run JUST this
# (via include_role tasks_from=fetch_kubeconfig) to re-sync stale
# kubeconfigs after a VM's IP changed and the inventory was updated —
# otherwise kubectl/liqoctl in teardown dial the old IP and time out.
#
# Guarded on the kubeconfig's existence so it is a safe no-op on a node
# whose k3s was already uninstalled (e.g. a manual k3s-uninstall.sh).

- name: Check whether the k3s kubeconfig exists on {{ cluster_id }}
  ansible.builtin.stat:
    path: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig_file

- name: Refresh control-host kubeconfig for {{ cluster_id }}
  when: k3s_kubeconfig_file.stat.exists
  block:

    - name: Make the kubeconfig readable to the ansible_user
      ansible.builtin.file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'
      become: true

    - name: Slurp the on-cluster kubeconfig
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig_raw

    - name: Ensure kubeconfig dir exists on the control host
      ansible.builtin.file:
        path: "{{ kubeconfig_dir }}"
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: Write kubeconfig to control host with reachable apiserver URL
      ansible.builtin.copy:
        content: "{{ k3s_kubeconfig_raw.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' + ansible_host + ':6443') }}"
        dest: "{{ kubeconfig_dir }}/{{ cluster_id }}.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false
