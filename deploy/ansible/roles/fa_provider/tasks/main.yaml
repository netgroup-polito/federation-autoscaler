---
# Deploys the provider agent on a provider cluster. Mirrors
# test/e2e/bootstrap/overlays.go's ApplyOverlay for config/agent/provider.

# Pin the agent image with a STREAM edit (sed over the built manifest) instead of
# `kustomize edit set image` on config/agent/base. The old approach mutated that
# SHARED base kustomization once per provider host; because Ansible runs the
# provider hosts in parallel, the concurrent `kustomize edit` writes raced and
# could truncate config/agent/base/kustomization.yaml down to just its `images:`
# block — stripping the `resources:` list, so the overlay silently applied without
# agent-config or the agent Deployment. This stream edit never touches the repo,
# so parallel hosts are safe. `pipefail` also surfaces a kustomize-build failure
# instead of masking it as an empty apply.
- name: Apply provider agent overlay (agent image pinned via stream edit — race-free)
  delegate_to: localhost
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      kustomize build {{ fa_repo_root }}/config/agent/provider \
        | sed 's#image: federation-autoscaler/agent:latest#image: {{ fa_image_agent }}#' \
        | kubectl --kubeconfig {{ cluster_kubeconfig }} apply -f -
  changed_when: true

- name: Patch agent-config ConfigMap with this cluster's identity, broker URL, and mock URLs
  delegate_to: localhost
  ansible.builtin.shell:
    cmd: |
      kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} \
        patch configmap agent-config --type merge -p \
        '{"data":{"brokerUrl":"https://{{ broker_address }}:{{ broker_node_port }}","clusterId":"{{ cluster_id }}","liqoClusterId":"{{ cluster_id }}","mockEcoUrl":"{{ fa_mock_eco_url }}","mockGeoUrl":"{{ fa_mock_geo_url }}"}}'
  changed_when: true

# Location is AUTO-DISCOVERED from the provider's node IP (mock-geo maps the IP
# to a region + coordinates that drive the eco/latency strategies). Optionally
# define `fa_advertised_ip` in inventory (per host) to OVERRIDE the node IP — the
# demo steering lever: set it to an IP inside a distinct mock-geo /26 block so the
# demo's providers land in DISTINCT cities and the greenest/closest wins visibly.
# Unset ⇒ the agent geolocates its own node IP.
- name: Set this provider's advertised-ip override (location discovery)
  delegate_to: localhost
  when: fa_advertised_ip is defined and (fa_advertised_ip | length) > 0
  ansible.builtin.shell:
    cmd: |
      kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} \
        patch configmap agent-config --type merge -p \
        '{"data":{"advertisedIp":"{{ fa_advertised_ip }}"}}'
  changed_when: true

# Per-provider unit prices for price-based placement. Define `fa_provider_prices`
# in inventory (per host) as a map of resource → price-per-unit-per-hour, e.g.
#   fa_provider_prices: {cpu: "0.03", memory: "0.004"}
# Give the demo's two providers DISTINCT values so the cheapest wins visibly.
# Stored as JSON in prices.yaml (the agent parses YAML or JSON). When the var is
# unset the empty ConfigMap from the overlay stands and the provider advertises
# no price — fully backwards-compatible.
- name: Set this provider's unit prices (price-based placement)
  delegate_to: localhost
  when: fa_provider_prices is defined and (fa_provider_prices | length) > 0
  ansible.builtin.shell:
    cmd: |
      kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} \
        create configmap agent-prices \
        --from-literal=prices.yaml='{{ fa_provider_prices | to_json }}' \
        --dry-run=client -o yaml | \
        kubectl --kubeconfig {{ cluster_kubeconfig }} apply -f -
  changed_when: true
