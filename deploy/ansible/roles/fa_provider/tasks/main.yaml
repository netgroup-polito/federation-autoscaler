---
# Deploys the provider agent on a provider cluster. Mirrors
# test/e2e/bootstrap/overlays.go's ApplyOverlay for config/agent/provider.

- name: Render provider-agent overlay with Docker Hub image, apply, then reset
  delegate_to: localhost
  block:
    - name: Set agent image
      ansible.builtin.shell:
        cmd: |
          cd {{ fa_repo_root }}/config/agent/base
          kustomize edit set image federation-autoscaler/agent={{ fa_image_agent }}
      changed_when: true
    - name: Apply provider agent overlay
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig {{ cluster_kubeconfig }} apply -k {{ fa_repo_root }}/config/agent/provider
      changed_when: true
  always:
    - name: Reset agent image override
      ansible.builtin.shell:
        cmd: |
          cd {{ fa_repo_root }}/config/agent/base
          kustomize edit set image federation-autoscaler/agent=federation-autoscaler/agent:latest
      changed_when: true

- name: Patch agent-config ConfigMap with this cluster's identity + broker URL
  delegate_to: localhost
  ansible.builtin.shell:
    cmd: |
      kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} \
        patch configmap agent-config --type merge -p \
        '{"data":{"brokerUrl":"https://{{ broker_address }}:{{ broker_node_port }}","clusterId":"{{ cluster_id }}","liqoClusterId":"{{ cluster_id }}"}}'
  changed_when: true
