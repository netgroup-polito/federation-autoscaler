---
# Deploys the consumer agent + gRPC server on a consumer cluster.
# Mirrors test/e2e/bootstrap/overlays.go's ApplyOverlay calls for
# config/agent/consumer and config/grpc-server.

- name: Render consumer-agent overlay with Docker Hub image, apply, then reset
  delegate_to: localhost
  block:
    - name: Set agent image
      ansible.builtin.shell:
        cmd: |
          cd {{ fa_repo_root }}/config/agent/base
          kustomize edit set image federation-autoscaler/agent={{ fa_image_agent }}
      changed_when: true
    - name: Apply consumer agent overlay
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig {{ cluster_kubeconfig }} apply -k {{ fa_repo_root }}/config/agent/consumer
      changed_when: true
  always:
    - name: Reset agent image override
      ansible.builtin.shell:
        cmd: |
          cd {{ fa_repo_root }}/config/agent/base
          kustomize edit set image federation-autoscaler/agent=federation-autoscaler/agent:latest
      changed_when: true

- name: Render grpc-server overlay with Docker Hub image, apply, then reset
  delegate_to: localhost
  block:
    - name: Set grpc-server image
      ansible.builtin.shell:
        cmd: |
          cd {{ fa_repo_root }}/config/grpc-server
          kustomize edit set image federation-autoscaler/grpc-server={{ fa_image_grpc_server }}
      changed_when: true
    - name: Apply grpc-server overlay
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig {{ cluster_kubeconfig }} apply -k {{ fa_repo_root }}/config/grpc-server
      changed_when: true
  always:
    - name: Reset grpc-server image override
      ansible.builtin.shell:
        cmd: |
          cd {{ fa_repo_root }}/config/grpc-server
          kustomize edit set image federation-autoscaler/grpc-server=federation-autoscaler/grpc-server:latest
      changed_when: true

- name: Patch agent-config ConfigMap with the resolved broker URL + mock URLs
  delegate_to: localhost
  ansible.builtin.shell:
    cmd: |
      kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} \
        patch configmap agent-config --type merge -p \
        '{"data":{"brokerUrl":"https://{{ broker_address }}:{{ broker_node_port }}","clusterId":"{{ cluster_id }}","liqoClusterId":"{{ cluster_id }}","mockEcoUrl":"{{ fa_mock_eco_url }}","mockGeoUrl":"{{ fa_mock_geo_url }}"}}'
  changed_when: true

# The consumer's location (the origin point the Broker measures provider
# distances from under the latency strategy) is AUTO-DISCOVERED from its node IP.
# Optionally define `fa_advertised_ip` in inventory to OVERRIDE the node IP — set
# it to an IP inside a mock-geo /26 block to place the consumer in a specific
# city. Unset ⇒ the agent geolocates its own node IP.
- name: Set this consumer's advertised-ip override (location discovery)
  delegate_to: localhost
  when: fa_advertised_ip is defined and (fa_advertised_ip | length) > 0
  ansible.builtin.shell:
    cmd: |
      kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} \
        patch configmap agent-config --type merge -p \
        '{"data":{"advertisedIp":"{{ fa_advertised_ip }}"}}'
  changed_when: true

# Declare this consumer's placement policy. With type=Price the Broker, on each
# /nodegroups call from this consumer, narrows to the cheapest priced provider
# with capacity (cheapest-first greedy) instead of exposing all providers. The
# agent re-reads this CRD every heartbeat, so editing it reprioritises live.
#
# OFF by default: the ConsumerPolicy is operator-stamped (the agent only reads
# it), so the demo leaves it to you to `kubectl apply` on the consumer — that is
# the manual opt-in. Set `fa_consumer_price_policy=true` to have this role stamp
# it for you (optionally with a non-default `fa_consumer_placement_type`).
- name: Stamp the consumer's ConsumerPolicy (price-preferring placement)
  delegate_to: localhost
  when:
    - fa_consumer_price_policy | default(false) | bool
    - (fa_consumer_placement_type | default('Price')) | length > 0
  ansible.builtin.shell:
    cmd: |
      cat <<'EOF' | kubectl --kubeconfig {{ cluster_kubeconfig }} -n {{ fa_namespace }} apply -f -
      apiVersion: autoscaling.federation-autoscaler.io/v1alpha1
      kind: ConsumerPolicy
      metadata:
        name: default
        namespace: {{ fa_namespace }}
      spec:
        placement:
          type: {{ fa_consumer_placement_type | default('Price') }}
      EOF
  changed_when: true

# Stamp the Liqo NamespaceOffloading singleton for the `default`
# namespace. Liqo's admission webhook hardcodes the name to "offloading"
# (one per K8s namespace, shared by every Reservation that lands here),
# so the agent intentionally does NOT create it per-Reservation —
# multiple in-flight peers to the same namespace would race on the same
# CR. The selector matches any Liqo virtual node so federation
# offloading is enabled for `default`; the per-Reservation ResourceSlice
# picks the specific provider. Operators with workloads outside
# `default` should stamp their own NSO in those namespaces.
#
# podOffloadingStrategy: LocalAndRemote — Pods may run on the consumer's
# OWN node first and only spill onto borrowed provider nodes when local
# capacity is exhausted (the natural autoscaler story). 'Remote' would
# instead force EVERY Pod off the local node onto a virtual node, which
# is not what we want. Since no virtual node exists until CA scales up,
# the scheduler fills local first; the overflow pends and triggers the
# borrow.
- name: Bootstrap Liqo NamespaceOffloading for the default namespace
  delegate_to: localhost
  ansible.builtin.shell:
    cmd: |
      cat <<'EOF' | kubectl --kubeconfig {{ cluster_kubeconfig }} apply -f -
      apiVersion: offloading.liqo.io/v1beta1
      kind: NamespaceOffloading
      metadata:
        name: offloading
        namespace: default
      spec:
        namespaceMappingStrategy: DefaultName
        podOffloadingStrategy: LocalAndRemote
        clusterSelector:
          nodeSelectorTerms:
            - matchExpressions:
                - key: liqo.io/type
                  operator: In
                  values:
                    - virtual-node
      EOF
  changed_when: true
