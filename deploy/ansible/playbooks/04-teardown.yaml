---
# 04-teardown.yaml — full, reliable clean slate (k3s wipe).
#
# Wipes k3s on every host, which removes ALL cluster state in one shot:
# Liqo (peerings, tenants, authentication, offloading), cert-manager,
# the federation-autoscaler namespace + CRDs, and every workload. Then
# it removes the control-host kubeconfigs so 01-bootstrap re-fetches them
# fresh with the current inventory IPs.
#
# Why a wipe instead of a graceful `liqoctl unpeer`/`uninstall` teardown:
# Liqo's uninstall pre-checks refuse to proceed while any peering,
# authentication, or namespace offloading remains, and untangling that
# reliably (especially after an interrupted run or a VM IP change) proved
# brittle and kept needing manual intervention. Wiping k3s never runs
# liqoctl, so there is nothing to get stuck on — it always succeeds.
#
# Fully hands-off. The clean cycle is:
#   04-teardown → 01-bootstrap → 02-deploy → 03-verify
# then drive scale-up / scale-down with kubectl apply/delete of the
# sample workload. No manual kubectl / liqoctl / k3s commands anywhere.
#
# NOTE: this is destructive by design (drops the whole k3s node, including
# any PVs and host iptables rules). On the demo VMs that is exactly what
# we want; do NOT point this at a cluster whose k3s you need to keep.

- name: Wipe k3s on every host (full clean slate)
  hosts: all
  gather_facts: false
  become: true
  tasks:

    # k3s-uninstall.sh stops k3s and removes the binary, all CRs/CRDs,
    # CNI, and iptables rules. `|| true` tolerates a host where k3s is
    # already gone (the script removes itself on success), so re-runs and
    # partially-wiped fleets don't fail.
    - name: Run k3s-uninstall.sh ({{ cluster_id }})
      ansible.builtin.shell:
        cmd: "/usr/local/bin/k3s-uninstall.sh || true"
      changed_when: true

    - name: Remove the stale control-host kubeconfig for {{ cluster_id }}
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ cluster_kubeconfig }}"
        state: absent
